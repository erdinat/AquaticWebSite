name: Deploy to aquatic.com.tr (Main)

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🚀 Deploy to TR
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3

    - name: ⚙️ Use Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'

    - name: 🔨 Install dependencies
      run: npm ci

    - name: 🏗️ Build Project
      run: npm run build

    - name: 📂 Sync files (TR)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: aquatic.com.tr
        username: ${{ secrets.TR_FTP_USERNAME }}
        password: ${{ secrets.TR_FTP_PASSWORD }}
        local-dir: ./dist/
        server-dir: httpdocs/
        dangerous-clean-slate: false
